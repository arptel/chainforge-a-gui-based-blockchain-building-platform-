<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChainForge — Architecture Graphs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --bg: #0b0c15;
      --surface: rgba(22, 24, 45, 0.75);
      --surface-deep: #0b0c15;
      --border: rgba(46, 48, 80, 0.5);
      --cyan: #22d3ee;
      --purple: #a78bfa;
      --text: #ffffff;
      --text-dim: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      /* FIGMA STYLE DOT GRID BACKGROUND */
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 0);
      background-size: 32px 32px;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }
    
    .main-content {
      flex: 1;
      height: 100vh;
      position: relative;
      /* Soft vignette for depth */
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.5) 100%);
    }
    
    #graphCanvas {
      width: 100%; height: 100%;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }
    #graphCanvas.visible {
      opacity: 1;
    }
    
    .sidebar {
      width: 280px;
      height: 100vh;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      box-shadow: -15px 0 45px rgba(0,0,0,0.6);
      z-index: 10;
    }

    .sidebar-header {
      padding: 2.2rem 1.5rem 1rem;
    }
    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .sidebar-header p {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--cyan);
      margin-top: 6px;
      font-weight: 700;
    }

    .tabs {
      display: flex; flex-direction: column; gap: 0.6rem;
      padding: 1.5rem 1rem;
    }
    .tabs button {
      background: rgba(255,255,255,0.03); color: var(--text-dim);
      border: 1px solid transparent; padding: 0.8rem 1.2rem;
      border-radius: 12px; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; font-weight: 600; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
    }
    .tabs button:hover { 
      background: rgba(255,255,255,0.08); 
      color: var(--text);
      transform: translateX(4px);
    }
    .tabs button.active {
      background: rgba(34,211,238,0.15);
      border-color: rgba(34,211,238,0.4); 
      color: var(--cyan);
      box-shadow: 0 0 20px rgba(34,211,238,0.1);
    }

    .legend {
      margin-top: auto;
      padding: 1.5rem 1.2rem;
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }
    .legend-title {
      font-size: 0.7rem; margin-bottom: 15px;
      color: var(--text-dim); font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 12px;
      margin: 10px 0; color: var(--text-dim);
      font-weight: 500;
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  
  <div class="main-content">
    <div id="graphCanvas"></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h1>ChainForge</h1>
      <p>Architecture Graphs</p>
    </div>
    <div class="tabs" id="tabBar">
      <button class="active" onclick="showGraph(0)">Node Startup Wiring</button>
      <button onclick="showGraph(1)">Consensus ↔ Contracts</button>
      <button onclick="showGraph(2)">TX Execution Pipeline</button>
      <button onclick="showGraph(3)">P2P Message Router</button>
      <button onclick="showGraph(4)">Contract Registry</button>
      <button onclick="showGraph(5)">Full System Overview</button>
    </div>

    <div class="legend" id="legend">
      <div class="legend-title">Entity Types</div>
    </div>
  </div>

  <script>
  // ========== COLOR PALETTE (PRIMARY RGB COLORS) ==========
  const C = {
    core:      { bg: '#3b82f6' }, // Blue
    consensus: { bg: '#f97316' }, // Orange
    contract:  { bg: '#ef4444' }, // Red
    network:   { bg: '#a855f7' }, // Purple
    sync:      { bg: '#06b6d4' }, // Cyan
    vm:        { bg: '#22c55e' }, // Green
    state:     { bg: '#eab308' }, // Yellow
    api:       { bg: '#ec4899' }, // Pink
    config:    { bg: '#9ca3af' }, // Gray
    builder:   { bg: '#8b5cf6' }, // Violet
    sdk:       { bg: '#f43f5e' }, // Rose
    file:      { bg: '#84cc16' }, // Lime
  };

  function mkNode(id, label, group, size = 22) {
    const c = C[group] || C.core;
    size = size * 1.25;
    return {
      id, label, group,
      size,
      shape: 'dot',
      color: {
        background: c.bg,
        border: c.bg,
        hover: { background: c.bg, border: '#ffffff' },
        highlight: { background: c.bg, border: '#ffffff' }
      },
      font: {
        color: '#ffffff',
        size: 15,
        face: 'Inter',
        vadjust: 14,
        strokeWidth: 4,
        strokeColor: '#0b0c15'
      },
      borderWidth: 0,
      shadow: {
        enabled: false
      }
    };
  }

  function mkEdge(from, to, label = '', dashes = false) {
    return {
      from, to, label,
      font: { 
        color: '#ffffff', 
        size: 11, 
        face: 'Inter', 
        strokeWidth: 3, 
        strokeColor: '#0b0c15', 
        align: 'middle' 
      },
      arrows: { to: { enabled: true, scaleFactor: 0.5, type: 'arrow' } },
      dashes,
      smooth: { type: 'curvedCW', roundness: 0.25 },
      width: 3.5,
      hoverWidth: 1,
      selectionWidth: 1
    };
  }

  // ========== GRAPH DEFINITIONS ==========
  const graphs = [

    // 0: Node Startup Wiring (DI)

      ]
    }
  ];

  let network = null;
  const container = document.getElementById('graphCanvas');

  const defaultOptions = {
    physics: {
      solver: 'forceAtlas2Based',
      forceAtlas2Based: {
        gravitationalConstant: -400,
        centralGravity: 0.015,
        springLength: 260,
        springConstant: 0.05,
        damping: 0.9,
        avoidOverlap: 1.0 
      },
      stabilization: { iterations: 150 }
    },
    interaction: {
      hover: true,
      tooltipDelay: 100,
      zoomView: true,
      dragNodes: true,
    },
    nodes: {
      shape: 'dot',
      scaling: { min: 15, max: 60 },
    },
    edges: {
      smooth: { type: 'curvedCW', roundness: 0.2 },
      width: 3.5
    },
    layout: { randomSeed: 42 },
  };

  function showGraph(idx) {
    // Reveal animation
    container.classList.remove('visible');
    
    setTimeout(() => {
      // Update tabs
      document.querySelectorAll('.tabs button').forEach((b, i) => b.classList.toggle('active', i === idx));

      const g = graphs[idx];

      // Render legend
      const legendEl = document.getElementById('legend');
      legendEl.innerHTML = `<div class="legend-title">Entity Types</div>` +
        g.legend.map(l => `<div class="legend-item"><div class="legend-dot" style="background:${l.color}; color:${l.color}"></div>${l.label}</div>`).join('');

      // Edge coloring
      const nodeColors = {};
      g.nodes.forEach(n => nodeColors[n.id] = (C[n.group] || C.core).bg);
      
      g.edges.forEach(e => {
        const cFrom = nodeColors[e.from] || '#ffffff';
        const cTo = nodeColors[e.to] || cFrom;
        const chosenColor = Math.random() > 0.5 ? cFrom : cTo;
        e.color = { color: chosenColor, hover: '#ffffff', highlight: '#ffffff', opacity: 0.8 };
      });

      if (network) network.destroy();
      const data = { nodes: new vis.DataSet(g.nodes), edges: new vis.DataSet(g.edges) };
      network = new vis.Network(container, data, defaultOptions);
      
      network.once('stabilizationIterationsDone', () => {
        network.setOptions({ physics: { enabled: false } });
        container.classList.add('visible');
      });
    }, 200);
  }

  // Initial render
  showGraph(0);
  </script>
</body>
</html>
