<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ChainForge Simulator — Universal Blockchain Runner">
    <title>ChainForge Simulator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- ================================================================ -->
    <!-- HEADER                                                           -->
    <!-- ================================================================ -->
    <header id="header">
        <div class="header-left">
            <h1 id="app-title">⛓ ChainForge Simulator</h1>
            <span id="status-line" class="status-line">Detecting chain…</span>
        </div>
        <div class="header-right">
            <button id="btn-info" class="btn btn-icon" title="Chain Info" disabled>ℹ️</button>

            <div id="add-node-wrapper" class="dropdown-wrapper">
                <button id="btn-add-node" class="btn btn-primary" disabled>+ Add Node ▾</button>
                <div id="add-node-menu" class="dropdown-menu hidden"></div>
            </div>

            <button id="btn-reset" class="btn btn-danger" title="Reset Network" disabled>Reset</button>
        </div>
    </header>

    <!-- ================================================================ -->
    <!-- MAIN CONTENT                                                     -->
    <!-- ================================================================ -->
    <main id="main-content">
        <!-- Loading / error states -->
        <div id="no-chain-msg" class="center-message hidden">
            <p>⚠️ No <code>chain_node/</code> folder detected.</p>
            <p>Extract your ChainForge ZIP into <code>Simulator/backend/chain_node/</code> and reload.</p>
        </div>
        <div id="loading-msg" class="center-message">
            <p>⏳ Loading chain…</p>
        </div>

        <!-- Whiteboard + Detail Panel -->
        <div id="workspace" class="hidden">
            <div id="whiteboard-container">
                <canvas id="graph-canvas"></canvas>
                <!-- Node Detail Side Panel (inside container for absolute positioning) -->
                <aside id="detail-panel" class="detail-panel hidden">
                    <button id="btn-close-detail" class="btn-close">✕</button>
                    <div id="detail-content"></div>
                </aside>
            </div>

            <!-- Consensus Phase Indicator Bar -->
            <div id="phase-bar" class="phase-bar">
                <span id="phase-consensus-name" class="phase-label">—</span>
                <div id="phase-dots" class="phase-dots"></div>
            </div>


        </div>
    </main>

    <!-- ================================================================ -->
    <!-- FOOTER STATUS BAR                                                -->
    <!-- ================================================================ -->
    <footer id="footer">
        <span id="stat-nodes">Nodes: 0</span>
        <span id="stat-blocks">Blocks: 0</span>
        <span id="stat-consensus">Consensus: —</span>
    </footer>

    <!-- ================================================================ -->
    <!-- INFO MODAL                                                       -->
    <!-- ================================================================ -->
    <div id="info-modal-overlay" class="modal-overlay hidden">
        <div id="info-modal" class="modal">
            <div class="modal-header">
                <h2>Chain Information</h2>
                <button id="btn-close-modal" class="btn-close">✕</button>
            </div>
            <div id="info-modal-body" class="modal-body"></div>
        </div>
    </div>

    <!-- ================================================================ -->
    <!-- SCRIPTS                                                          -->
    <!-- ================================================================ -->
    <script src="js/app.js"></script>
</body>
</html>
